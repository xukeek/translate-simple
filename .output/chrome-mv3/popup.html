<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>沉浸式翻译</title>
  <script type="module" crossorigin src="/chunks/popup-CYALPQjH.js"></script>
  <link rel="modulepreload" crossorigin href="/chunks/storage-BBPdERmh.js">
  <link rel="stylesheet" crossorigin href="/assets/popup-C44ItE_n.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>沉浸式翻译</h1>
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="form-group">
      <label for="engine">翻译引擎</label>
      <select id="engine">
        <option value="google">Google 翻译（免费）</option>
        <option value="siliconflow">硅基流动</option>
        <option value="zhipu">智谱 GLM</option>
      </select>
    </div>

    <div class="form-group">
      <label for="targetLang">目标语言</label>
      <select id="targetLang">
        <option value="zh-CN">简体中文</option>
        <option value="en">英语</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
        <option value="fr">法语</option>
        <option value="de">德语</option>
        <option value="es">西班牙语</option>
        <option value="ru">俄语</option>
        <option value="pt">葡萄牙语</option>
      </select>
    </div>

    <div class="form-group">
      <label>对照样式</label>
      <div class="radio-group">
        <label><input type="radio" name="displayMode" value="vertical" checked> 纵向</label>
        <label><input type="radio" name="displayMode" value="horizontal"> 横向并排</label>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="openOptions">设置</a>
    </div>
  </div>
</body>
</html>
