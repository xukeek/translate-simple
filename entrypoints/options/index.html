<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>设置 - 沉浸式翻译</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <h1>设置</h1>

    <section>
      <h2>默认配置</h2>
      <div class="form-group">
        <label for="defaultEngine">默认翻译引擎</label>
        <select id="defaultEngine">
          <option value="google">Google 翻译（免费）</option>
          <option value="siliconflow">硅基流动</option>
          <option value="zhipu">智谱 GLM</option>
        </select>
      </div>

      <div class="form-group">
        <label for="defaultTargetLang">默认目标语言</label>
        <select id="defaultTargetLang">
          <option value="zh-CN">简体中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
          <option value="pt">葡萄牙语</option>
        </select>
      </div>
    </section>

    <section>
      <h2>引擎配置</h2>

      <div class="engine-config" id="engine-siliconflow">
        <h3>硅基流动</h3>
        <p class="hint">注册获取免费 API Key：<a href="https://cloud.siliconflow.cn" target="_blank">cloud.siliconflow.cn</a></p>
        <p class="hint">免费模型：tencent/Hunyuan-MT-7B（翻译专用）、THUDM/GLM-Z1-9B-0414</p>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" class="api-key" data-engine="siliconflow" placeholder="sk-..." />
        </div>
        <div class="form-group">
          <label>模型</label>
          <input type="text" class="model" data-engine="siliconflow" placeholder="tencent/Hunyuan-MT-7B" />
        </div>
      </div>

      <div class="engine-config" id="engine-zhipu">
        <h3>智谱 GLM</h3>
        <p class="hint">注册获取免费 API Key：<a href="https://bigmodel.cn" target="_blank">bigmodel.cn</a>（需实名认证）</p>
        <p class="hint">免费模型：GLM-4-Flash（永久免费）</p>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" class="api-key" data-engine="zhipu" placeholder="zhipu-api-key" />
        </div>
        <div class="form-group">
          <label>模型</label>
          <input type="text" class="model" data-engine="zhipu" placeholder="GLM-4-Flash" />
        </div>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn">保存</button>
      <span id="status" class="status"></span>
    </div>
  </div>
  <script type="module" src="options.ts"></script>
</body>
</html>
